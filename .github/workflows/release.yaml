name: Attach Artifacts to Release

on:
  release:
    types: [published]

jobs:
  attach-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from release tag
        id: version
        run: |
          # Strip leading 'v' from tag if present (e.g. v0.1.18 -> 0.1.18)
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG, version: $VERSION"

      - name: Download artifacts from Google Cloud Storage
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://storage.googleapis.com/incognide-executables"
          mkdir -p artifacts

          # Define all expected artifacts
          declare -A FILES=(
            ["linux-x64/incognide_${VERSION}_x64.deb"]="incognide_${VERSION}_x64.deb"
            ["linux-x64/incognide_${VERSION}_x64.AppImage"]="incognide_${VERSION}_x64.AppImage"
            ["windows-x64/incognide_${VERSION}_x64.exe"]="incognide_${VERSION}_x64.exe"
            ["macos-arm64/incognide_${VERSION}_arm64.dmg"]="incognide_${VERSION}_arm64.dmg"
            ["macos-arm64/incognide_${VERSION}_arm64.zip"]="incognide_${VERSION}_arm64.zip"
            ["mas-arm64/incognide_${VERSION}_arm64.pkg"]="incognide_${VERSION}_arm64.pkg"
          )

          for gcs_path in "${!FILES[@]}"; do
            filename="${FILES[$gcs_path]}"
            url="${BASE_URL}/${gcs_path}"
            echo "Downloading $url ..."
            if curl -fSL --retry 3 --retry-delay 5 -o "artifacts/$filename" "$url"; then
              echo "  -> Downloaded $filename ($(stat -c%s "artifacts/$filename") bytes)"
            else
              echo "  -> WARNING: Failed to download $filename (may not exist yet)"
              rm -f "artifacts/$filename"
            fi
          done

          echo "=== Downloaded artifacts ==="
          ls -lh artifacts/ || echo "No artifacts downloaded"

      - name: Attach artifacts to release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ATTACHED=0
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filesize=$(stat -c%s "$file")
              if [ "$filesize" -gt 1000 ]; then
                echo "Attaching $(basename "$file") ($filesize bytes) to release $TAG"
                gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
                ATTACHED=$((ATTACHED + 1))
              else
                echo "Skipping $(basename "$file") — too small ($filesize bytes), likely an error page"
              fi
            fi
          done
          echo "Attached $ATTACHED artifacts to release $TAG"
          if [ "$ATTACHED" -eq 0 ]; then
            echo "::warning::No artifacts were attached. The build may not have completed yet for version ${{ steps.version.outputs.version }}."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
